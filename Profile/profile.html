<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowFix - Profile</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="main-header">
    <div class="container">
      <div class="nav-wrapper">
        <div class="logo"><h1>FlowFix</h1></div>
        <nav class="main-nav">
          <a href="../Login/login.html" id="nav-login" class="btn">Login</a>
          <a href="../GEN-Maintenance-Check/Maintenance.html">General Maintenance Check</a>
          <a href="../Pricing/pricing.html">Pricing</a>
          <a href="../Location/Location.html">Location</a>
          <a href="../FAQ/FAQ.html">FAQ</a>
          <a href="#contact" class="btn cta-nav">Contact</a>
          <a href="#Emergency-Plumbing" class="btn btn-emergency">Emergency Help</a>
          <button class="btn theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">
            <img src="../dark-mode.png" id="themeIcon" alt="Dark Mode Icon" width="30" height="30">
          </button>
        </nav>
      </div>
    </div>
  </header>
<!-- Profile feature allows users to alter their Display name, phone #, location, and email. name changes feature is to be reviewed due to security & auth reasons-->
  <section class="login-section">
    <div class="login-card">
      <h2>Your Profile</h2>
      <p class="login-subtitle" id="role-badge"></p>
      <div class="login-message" id="message"></div>
<!-- TODO: @Leilamoumou name changes feature is to be reviewed due to security & auth reasons. Users shouldn't be able to alternate between names frequently.-->
      <form id="profile-form">
        <label for="display-name">Name Display</label>
        <input type="text" id="display-name" placeholder="Your name" />

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Be sure to follow the following format: XXX-XXX-XXXX" />

        <label for="location">Location</label>
        <input type="text" id="location" placeholder="city,state" />

        <label for="email">Email</label>
        <input type="email" id="email" disabled />

        <button type="submit" class="btn-primary">Save Changes</button>
      </form>
    </div>
  </section>

  <script src="../script.js"></script>
  <script type="module">
    import { getApps, initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:    "",
      authDomain:"",
      projectId: "flowfix-65fd1",
      appId:     "1:878384279716:web:041715c6ae2aa120b23631"
    };

    const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const msgEl = document.getElementById("message");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "../Login/login.html";
        return;
      }

      // Load existing profile data
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        const data = snap.data();
        document.getElementById("display-name").value = data.displayName || "";
        document.getElementById("phone").value        = data.phone       || "";
        document.getElementById("location").value     = data.location    || "";
        document.getElementById("role-badge").textContent = data.role === "plumber" ? "Plumber" : "Customer";
      }

      // Email is read-only from auth
      document.getElementById("email").value = user.email;

      // Save changes
      document.getElementById("profile-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          await updateDoc(doc(db, "users", user.uid), {
            displayName: document.getElementById("display-name").value.trim(),
            phone:       document.getElementById("phone").value.trim(),
            location:    document.getElementById("location").value.trim()
          });
          msgEl.textContent = "Profile updated successfully.";
          msgEl.className = "login-message success";
        } catch (err) {
          msgEl.textContent = "Failed to save changes. Please try again.";
          msgEl.className = "login-message error";
        }
      });
    });
  </script>
  <script type="module" src="../auth-state.js"></script>
</body>
</html>
