<!-- Firebase Authentication ** adjusted script-->
    <script type="module">
      import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
      import {
        getAuth,
        setPersistence,
        browserLocalPersistence,
        browserSessionPersistence,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        sendPasswordResetEmail 
      } 
      from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

      //config. cred. info.

const firebaseConfig = {
    apiKey:     "AIzaSyCEeLF_HRy9s4UC_Har6OnzUjJj3Ig4cEw",
    authDomain: "flowfix-65fd1.firebaseapp.com",
    projectId: "flowfix-65fd1",
    appId: "1:878384279716:web:041715c6ae2aa120b23631",      };
      const app  = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      let isSignUp = false;


//DOM btn refs
      const form        = document.getElementById("auth-form");
      const submitBtn   = document.getElementById("submit-btn");
      const switchBtn   = document.getElementById("switch-btn");
      const formTitle   = document.getElementById("form-title");
      const formSub     = document.getElementById("form-subtitle");
      const switchLabel = document.getElementById("switch-label");
      const messageEl   = document.getElementById("message");
      //additional functions
      const extrasRow   = document.getElementById("extras-row");

      const forgotLink  = document.getElementById("forgot-link");
      
    // login toggle functionality
     switchBtn.addEventListener("click", () => {

        isSignUp = !isSignUp;
        
        formTitle.textContent   = isSignUp ? "Create Account" : "Login";
        formSub.textContent     = isSignUp ? "Join us today!" : "Welcome back!";
        submitBtn.textContent   = isSignUp ? "Sign Up" : "Log in";
        switchLabel.textContent = isSignUp ? "Already a member?" : "New to FlowFix?";
        switchBtn.textContent   = isSignUp ? "Log in" : "Sign up";
        // hide remember me option &  forgot password upon sign up site, only show on login
         extrasRow.style.display = isSignUp ? "none" : "flex";
         document.getElementById("password-hint").style.display = isSignUp ? "block" : "none";
         //role selection toggle
         document.getElementById("role-select").style.display = isSignUp ? "flex" : "none";
        clearMessage();
      });
      //forgot password functionality for account access recovery
      // needs to appear upon a certain # of failed attempts
      let forgotAttempts = 0;
let forgotWindowStart = null;
const FORGOT_LIMIT = 3;
const FORGOT_WINDOW_MS = 60 * 1000;

forgotLink.addEventListener("click", async (e) => {
  e.preventDefault();

const now = Date.now();
  if (!forgotWindowStart || now - forgotWindowStart > FORGOT_WINDOW_MS) {
    forgotAttempts = 0;
    forgotWindowStart = now;
  }
  forgotAttempts++;
  if (forgotAttempts > FORGOT_LIMIT) {
    showMessage("Too many attempts to reset password occurred . Please wait before attempting again.", "error");
    return;
  }

        const email = document.getElementById("email").value.trim();
        if (!email) {
          showMessage("Enter your email before selecting Forgot Password.", "error");
          return;
        }
        try {
          await sendPasswordResetEmail(auth, email);
          showMessage("Password reset email sent, check your inbox for further instructions.", "success");
        } catch (error) {
          showMessage(friendlyError(error.code), "error");
        }
      });
      
      //form submit functionality 
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage();

        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        
        //account creation & login check + error handling :
 try {
          if (isSignUp) {
             const userCredential = await createUserWithEmailAndPassword(auth, email, password);
           
             const role = document.querySelector('input[name="role"]:checked').value;
          
             await new Promise(resolve => setTimeout(resolve, 500));

            await setDoc(doc(db, "users", userCredential.user.uid), {
                  email,
                  role,
                 createdAt: new Date()
  });
  
            showMessage("Account creation successful.", "success");
            setTimeout(() => { window.location.href = "../index.html"; }, 1000);

          }
else {
  const rememberMe = document.getElementById("remember-me").checked;
  await setPersistence(auth, rememberMe ? browserLocalPersistence : browserSessionPersistence);
          await signInWithEmailAndPassword(auth, email, password);

            const user  = auth.currentUser;
            const token = await user.getIdToken();
try {
              const response = await fetch('https://flowfix-capstone-production.up.railway.app/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
              });

if (!response.ok) {
  //logging the failures:
                console.warn("Profile fetch failed:", response.status);
              } else {
                const data = await response.json();
                console.log(data);
              }
            } catch (fetchError) {
              console.warn("Profile fetch error:", fetchError.message);
            }

            showMessage("Login successful.", "success");
            setTimeout(() => { window.location.href = "../index.html"; }, 1000);
          }

        } catch (error) {
          
          showMessage(friendlyError(error.code), "error");
        }
      });


  
      function showMessage(msg, type) {
        messageEl.textContent = msg;
        messageEl.className   = `login-message ${type}`;
      }

      function clearMessage() {
        messageEl.textContent = "";
        messageEl.className   = "login-message";
      }
      // Error handling, where account creation credentials are managed & invalid credientals are encountered for login
       function friendlyError(code) {
        const errors = {
          "auth/invalid-email":        "Invalid email.",
          "auth/user-not-found":       "No account found associated with this email.",
          //TODO: need to handle login attempts more efficiently for security measures. @Leilamoumou
          "auth/wrong-password":       "Incorrect password.",
          "auth/email-already-in-use": "An account with this email already exists.",
          //stricter reqs, to ensure more unique passwords
          "auth/weak-password":        "Password should be at least 6 characters.",
          "auth/invalid-credential":   "Invalid email or password.",
          "auth/too-many-requests":    "Too many attempts.",
        };
        return errors[code] || "An error occurred. Please try again.";
      }
    </script>

    <script type="module" src="../auth-state.js"></script>
  </body>
