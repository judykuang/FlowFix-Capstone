<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowFix - Password Reset </title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <header class="main-header">
    <div class="container">
      <div class="nav-wrapper">
        <div class="logo"><h1>FlowFix</h1></div>
      </div>
    </div>
  </header>
    <section class="login-section">
    <div class="login-card">
      <h2>Reset Password</h2>

      <p class="login-subtitle">Enter your new password below:</p>
      <div class="login-message" id="message"></div>


<!-- Password Form-->
 <form id="reset-form">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="••••••••" required />
        <button type="submit" class="btn-primary">Reset Password</button>
      </form>
    </div>
  </section>

<!-- React API call belowww-->
 
 <script type="module">
    import { getApps, initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { getAuth, confirmPasswordReset } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey:    "",
      authDomain:"",
      projectId: "flowfix-65fd1",
      appId:     "1:878384279716:web:041715c6ae2aa120b23631"
    };

    const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const msgEl = document.getElementById("message");

    // Obtaining oobCode from the URL for validation:
    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get("oobCode");

    if (!oobCode) {
      msgEl.textContent = "Invalid or missing reset link.";
      msgEl.className = "login-message error";
      document.getElementById("reset-form").style.display = "none";
    }

    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById("new-password").value;

      try {
        await confirmPasswordReset(auth, oobCode, newPassword);
        msgEl.textContent = "Password reset successful :D! Redirecting you to login ...";
        msgEl.className = "login-message success";
        document.getElementById("reset-form").style.display = "none";
        setTimeout(() => { window.location.href = "../Login/login.html"; }, 2000);
      } catch (err) {
        msgEl.textContent = err.code === "auth/weak-password"
        //still working on stricter reqs and managing past users with weaker passwords.
          ? "Password should be at least 6 characters."
          : "Reset failed. Your link may have expired, Resubmit the form for a new one.";
        msgEl.className = "login-message error";
      }
    });
  </script>
</body>
</html>
