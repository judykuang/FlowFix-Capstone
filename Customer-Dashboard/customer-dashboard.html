<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowFix - Dashboard</title>
  <link rel="stylesheet" href="../style.css">
  <!-- chat styling-->
   <style>
  .chat-panel {
    display: none;
    position: fixed;
    bottom: 0; right: 0;
    width: 360px; height: 480px;
    background: #fff;
    border-radius: 12px 12px 0 0;
    box-shadow: 0 -4px 24px rgba(30,58,95,0.18);
    flex-direction: column;
    z-index: 200;
  }
  .chat-panel.open { display: flex; }
  .chat-panel-header {
    background: #1e3a5f; color: #fff;
    padding: 0.75rem 1rem;
    border-radius: 12px 12px 0 0;
    display: flex; justify-content: space-between; align-items: center;
    font-weight: 700; font-size: 0.95rem;
  }
  .chat-panel-header button {
    background: none; border: none; color: #fff;
    font-size: 1.2rem; cursor: pointer;
  }
  .chat-messages-panel {
    flex: 1; overflow-y: auto;
    padding: 0.75rem 1rem;
    display: flex; flex-direction: column; gap: 0.5rem;
    background: #f9fafb;
  }
  .msg-bubble {
    max-width: 80%; padding: 0.5rem 0.75rem;
    border-radius: 10px; font-size: 0.88rem; line-height: 1.4;
  }
  .msg-bubble.mine {
    background: #1e3a5f; color: #fff;
    align-self: flex-end; border-bottom-right-radius: 2px;
  }
  .msg-bubble.theirs {
    background: #e5e7eb; color: #1e3a5f;
    align-self: flex-start; border-bottom-left-radius: 2px;
  }
  .msg-meta { font-size: 0.72rem; color: #9ca3af; margin-top: 2px; text-align: right; }
  .msg-meta.theirs { text-align: left; }
  .chat-input-area {
    display: flex; gap: 0.5rem; padding: 0.75rem;
    border-top: 1px solid #e5e7eb; background: #fff;
  }
  .chat-input-area input {
    flex: 1; padding: 0.5rem 0.75rem;
    border: 1.5px solid #d1d5db; border-radius: 8px;
    font-size: 0.9rem; font-family: 'Inria Sans', sans-serif; outline: none;
  }
  .chat-input-area input:focus { border-color: #1e3a5f; }
  .chat-input-area button {
    background: #f97316; color: #fff; border: none;
    border-radius: 8px; padding: 0.5rem 1rem;
    font-weight: 700; cursor: pointer; font-family: 'Inria Sans', sans-serif;
  }
  .btn-chat {
    background: #1e3a5f; color: #fff; border: none;
    border-radius: 6px; padding: 6px 14px;
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    font-family: 'Inria Sans', sans-serif; margin-top: 0.5rem;
  }
  .btn-status {
    background: #f97316; color: #fff; border: none;
    border-radius: 6px; padding: 6px 14px;
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    font-family: 'Inria Sans', sans-serif; margin-top: 0.5rem; margin-left: 0.5rem;
  }
  .card-actions { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
</style>
</head>
<body>
  <header class="main-header">
    <div class="container">
      <div class="nav-wrapper">
        <div class="logo"><h1><a href="/docs/index.html">Flowfix</a></h1></div>
        <nav class="main-nav">
          <a href="../Login/login.html" id="nav-login" class="btn">Login</a>
          <a href="../GEN-Maintenance-Check/Maintenance.html">General Maintenance Check</a>
          <a href="../Pricing/pricing.html">Pricing</a>
          <a href="../Location/Location.html">Location</a>
          <a href="../FAQ/FAQ.html">FAQ</a>
          <a href="#contact" class="btn cta-nav">Contact</a>
          <a href="#Emergency-Plumbing" class="btn btn-emergency">Emergency Help</a>
          <button class="btn theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">
            <img src="../dark-mode.png" id="themeIcon" alt="Dark Mode" width="30" height="30">
          </button>
        </nav>
      </div>
    </div>
  </header>

  <section class="dashboard-section">
    <div class="dashboard-card">

      <!-- Customer profile View: -->
      <div class="dashboard-profile">
        <h2>Welcome back, <span id="username"></span></h2>
        <p class="role-badge">Customer</p>
      </div>

        <!-- Book a Plumber  -->
      <div class="dashboard-block">
        <h3>Book a Plumber</h3>
        <div id="book-message"></div>
        <form id="book-form">

      <div class="form-group">
  <label for="job-type">Type of Job</label>
  <select id="job-type" required>
    <option value="">-- Select a specialty --</option>
    <option value="Leak Repair">Leak Repair</option>
    <option value="Pipe Replacement">Pipe Replacement</option>
    <option value="Drain Cleaning">Drain Cleaning</option>
    <option value="Water Heater">Water Heater</option>
    <option value="Toilet Repair">Toilet Repair</option>
    <option value="Sewer Line">Sewer Line</option>
    <option value="Emergency Service">Emergency Service</option>
  </select>
</div>

          <label for="issue">Describe your issue.</label>
          <textarea id="issue" rows="4" placeholder="e.g. flood" required></textarea>
          <button type="submit" class="btn-primary">Submit Request</button>
          
        </form>
      </div>

      <!-- Requests View for customers-->
      <div class="dashboard-block">
        <h3>Your Requests</h3>
        <div id="requests-list"><p>Loading...</p></div>
      </div>

    </div>
  </section>

  <script src="../script.js"></script>
  <script type="module">
    // imports & logic  TODO @Leilamoumou
    //Credentials & login to be validated, as well as auth

    //imports & credentialss
import { getApps, initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
import { getFirestore, doc, getDoc, collection, addDoc, query, where, orderBy, getDocs, updateDoc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:    "",
  authDomain:"",
  projectId: "flowfix-65fd1",
  appId:     "1:878384279716:web:041715c6ae2aa120b23631"
};

const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
let unsubscribeChat = null;
let activeChatRequestId = null;

/*AUTH guard:
Ensure those not signed in || not a user 
get redirected to the login page. :
*/
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "../Login/login.html";
    return;
  }
  // ROLECHECK : Plumbers cannot access customer dashboard
  // redirection to occur.:
const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.exists() && snap.data().role === "plumber") {
    window.location.href = "../Plumber-Dashboard/plumber-dashboard.html";
    return;
  }
  //Populate profile and load requests:
    document.getElementById("username").textContent = snap.data().name || user.email;


      loadRequests(user.uid);

//Job booking form submission
document.getElementById("book-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const jobType = document.getElementById("job-type").value;
  const issue = document.getElementById("issue").value.trim();
  const msgEl = document.getElementById("book-message");
    

    try {
      await addDoc(collection(db, "requests"), {
        customerEmail: user.email,
        customerUID:   user.uid,
        issueDescription: issue,
        jobType: document.getElementById('job-type').value,
        status:        "open",
        createdAt:     new Date()
        
      });
       // match plumber after request is saved
    const token = await auth.currentUser.getIdToken();
    //resorting to main domain for calling to server.
    const response = await fetch('https://flowfix-capstone-production.up.railway.app/match-plumber', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ jobType })
    });
       const match = await response.json();
    msgEl.textContent = match
      ? `Request submitted! You got matched with: ${match.name || match.email}`
      : "Request submitted. A plumber will be assigned shortly if there is no match based on specialty.";
    msgEl.className = "login-message success";

    document.getElementById("issue").value = "";
    document.getElementById("job-type").value = "";
    loadRequests(user.uid);

      
    } catch (err) {
      msgEl.textContent = "Failed to submit request. Please try to fill our form again.";
      msgEl.className = "login-message error";
    }
  });
});

async function loadRequests(uid) {
  const listEl = document.getElementById("requests-list");
  try {
    const q = query(
      collection(db, "requests"),
      where("customerUID", "==", uid),
      orderBy("createdAt", "desc")
    );
    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      listEl.innerHTML = "<p>No requests to fix any flows yet.</p>";
      return;
    }

  listEl.innerHTML = snapshot.docs.map(doc => {
  const d = doc.data();
  return `
    <div class="request-card">
      <p><strong>Issue:</strong> ${d.issueDescription}</p>
      <p><strong>Status:</strong> <span class="status-${d.status}">${d.status}</span></p>
      <p class="request-date">${d.createdAt?.toDate().toLocaleDateString()}</p>
      ${d.plumberEmail ? `
      <div class="card-actions">
        <button class="btn-chat chat-btn"
          data-id="${doc.id}"
          data-customer="${d.plumberEmail}">
          💬 Chat with Your Plumber
        </button>
      </div>` : ""}
    </div>`;
}).join("");


document.querySelectorAll(".chat-btn").forEach(btn => {
  btn.addEventListener("click", () =>
    openChat(btn.dataset.id, btn.dataset.customer)
  );
});

  } catch (err) {
    console.error("loadRequests error:", err);
    listEl.innerHTML = "<p>Failed to load requests.</p>";
  }}


function openChat(requestId, customerEmail) {
  if (activeChatRequestId === requestId) {
    document.getElementById("chat-input").focus();
    return;
  }
  if (unsubscribeChat) unsubscribeChat();

  activeChatRequestId = requestId;
  document.getElementById("chat-title").textContent = `Chat — ${customerEmail}`;
  document.getElementById("chat-panel").classList.add("open");
  document.getElementById("chat-messages").innerHTML = "";

  const q = query(
    collection(db, "requests", requestId, "messages"),
    orderBy("createdAt", "asc")
  );

  unsubscribeChat = onSnapshot(q, (snapshot) => {
    const container = document.getElementById("chat-messages");
    container.innerHTML = "";
    const user = auth.currentUser;

    snapshot.forEach(d => {
      const msg = d.data();
      const isMe = msg.senderUID === user.uid;
      const time = msg.createdAt?.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      container.innerHTML += `
        <div>
          <div class="msg-bubble ${isMe ? "mine" : "theirs"}">${msg.text}</div>
          <div class="msg-meta ${isMe ? "" : "theirs"}">${msg.senderEmail} · ${time ?? ""}</div>
        </div>`;
    });
    container.scrollTop = container.scrollHeight;
  });

  document.getElementById("chat-input").focus();
}

async function sendMessage() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text || !activeChatRequestId) return;
  const user = auth.currentUser;
  input.value = "";
  try {
    await addDoc(collection(db, "requests", activeChatRequestId, "messages"), {
      text,
      senderUID:   user.uid,
      senderEmail: user.email,
      createdAt:   serverTimestamp()
    });
  } catch (err) {
    console.error("sendMessage error:", err);
  }
}
document.getElementById("chat-send").addEventListener("click", sendMessage);
document.getElementById("chat-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
document.getElementById("chat-close").addEventListener("click", () => {
  document.getElementById("chat-panel").classList.remove("open");
  if (unsubscribeChat) { unsubscribeChat(); unsubscribeChat = null; }
  activeChatRequestId = null;
});
  </script>
   <!-- @leilamoumou added auth-state to ensure users stay logged in every page-->
     <script type="module" src="../auth-state.js"></script>
     <div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span id="chat-title">Chat</span>
    <button id="chat-close" aria-label="Close chat">✕</button>
  </div>
  <div class="chat-messages-panel" id="chat-messages"></div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Type a message..." />
    <button id="chat-send">Send</button>
    
  </div>
</div>
</body>
</html>
